name: ci

on:
  push:
    branches: [master, BlazeDevelopment]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm run build
      - run: npm test
      - name: Node smoke (built bundle, byte-exact)
        run: node scripts/smoke.mjs
      # Live-network integration tests (opt-in)
      - name: Live integration tests
        if: matrix.node == 20
        run: npx vitest run
        env:
          STEEM_LIVE: '1'
        continue-on-error: true

  deno-smoke:
    runs-on: ubuntu-latest
    name: deno (edge-style runtime)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Deno smoke (built ESM bundle)
        run: deno run --allow-read --node-modules-dir scripts/smoke.mjs
