name: docs

on:
  push:
    branches:
      - master
      - BlazeDevelopment
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/gen-docs.js'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # This repo doesn't commit a package-lock.json (it's gitignored), so use
      # `npm install` rather than `npm ci`, and skip lockfile-based caching.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate reference (always in sync with the source)
        run: npm run docs:generate

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
