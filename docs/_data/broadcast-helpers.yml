# Broadcast auth helpers (src/broadcast/helpers.js).
# Consumed by scripts/gen-docs.js -> docs/reference/broadcast.md
# Each block: name, signature, description.

addAccountAuth:
  signature: "steem.broadcast.addAccountAuth({ signingKey, username, authorizedUsername, role = 'posting', weight }, cb)"
  description: "Grants another account authority over `username` for the given role (defaults to `posting`). Reads the account, adds the authorized account to that role's `account_auths`, and broadcasts an `accountUpdate`. If `weight` is omitted it defaults to the role's `weight_threshold`. No-ops if the account already has the authority."

removeAccountAuth:
  signature: "steem.broadcast.removeAccountAuth({ signingKey, username, authorizedUsername, role = 'posting' }, cb)"
  description: "Revokes a previously granted account authority for the given role and broadcasts an `accountUpdate`. No-ops if the account was not present in `account_auths`."

addKeyAuth:
  signature: "steem.broadcast.addKeyAuth({ signingKey, username, authorizedKey, role = 'posting', weight }, cb)"
  description: "Adds a public key to the given role's `key_auths` for `username` and broadcasts an `accountUpdate`. If `weight` is omitted it defaults to the role's `weight_threshold`. No-ops if the key is already authorized."

removeKeyAuth:
  signature: "steem.broadcast.removeKeyAuth({ signingKey, username, authorizedKey, role = 'posting' }, cb)"
  description: "Removes a public key from the given role's `key_auths` and broadcasts an `accountUpdate`. No-ops if the key was not authorized."
